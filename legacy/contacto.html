  <style>
    /* ── PÁGINA: tema MILK (fondo blanco) ─────────────── */
    body{
      background: var(--milk);
      color: var(--black);
      min-height: 100vh;
      display: flex; flex-direction: column;
    }
    body::after{ opacity: 0.012; } /* grain aún más sutil sobre blanco */

    /* nav adaptado a fondo claro */
    .nav-b img{ filter: brightness(0); }
    .nav-l a{ color: var(--black); opacity: 0.7; }
    .nav-l a:hover, .nav-l a.act{ color: var(--light); opacity: 1; }
    .nav.scrolled{ background: var(--milk); border-bottom: 1px solid var(--black); }
    .ham span{ background: var(--black); }

    /* main wrapper */
    main{
      position: relative; z-index: 1; flex: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 160px 5vw 80px; width: 100%;
    }

    /* hero */
    .cnt-head{
      text-align: center; max-width: 720px; margin: 0 auto 64px;
      opacity: 0; transform: translateY(20px); animation: fi .8s ease .2s forwards;
    }
    .cnt-tag{
      display: inline-flex; align-items: center; gap: 14px;
      font-size: clamp(10px, 1vw, 12px);
      letter-spacing: .32em; text-transform: uppercase;
      color: var(--light); font-weight: 500; margin-bottom: 22px;
    }
    .cnt-tag::before{
      content: ''; display: inline-block;
      width: 28px; height: 1px; background: currentColor;
    }
    .cnt-title{
      font-family: var(--ff-display);
      font-size: clamp(56px, 10vw, 128px); line-height: .88;
      margin-bottom: 26px;
    }
    .cnt-sub{
      font-style: italic; font-weight: 300;
      font-size: clamp(15px, 1.4vw, 20px);
      color: var(--black); opacity: 0.6; letter-spacing: .02em;
    }
    @keyframes fi{ to{ opacity: 1; transform: none; } }

    /* form */
    .cnt-form{
      width: 100%; max-width: 560px;
      display: flex; flex-direction: column; gap: 28px;
      opacity: 0; transform: translateY(24px); animation: fi .9s ease .5s forwards;
    }
    .field{ display: flex; flex-direction: column; gap: 10px; }
    .field label{
      font-size: 10px; letter-spacing: .22em; text-transform: uppercase;
      color: var(--black); opacity: 0.7; font-weight: 600;
    }
    .field label .req{ color: var(--power); margin-left: 2px; }
    .field input, .field textarea{
      font-family: inherit; font-size: 15px; font-weight: 400; color: var(--black);
      background: transparent; border: 1px solid var(--black); border-radius: 0;
      padding: 16px 18px; outline: none;
      transition: border-color .25s, background .25s;
      width: 100%; letter-spacing: .01em;
    }
    .field textarea{ min-height: 150px; resize: vertical; line-height: 1.55; }
    .field input::placeholder, .field textarea::placeholder{
      color: rgba(0, 0, 0, .35); font-weight: 300;
    }
    .field input:hover, .field textarea:hover{ border-color: var(--light); }
    .field input:focus, .field textarea:focus{
      border-color: var(--light); background: rgba(253, 117, 43, .06);
    }

    /* CTA — outline naranja, hover rellena (mismo sistema que Ver nuestro trabajo) */
    .cnt-submit{
      position: relative; z-index: 1;
      align-self: flex-start; margin-top: 8px;
      display: inline-flex; align-items: center; justify-content: center; gap: 14px;
      min-height: 52px; box-sizing: border-box;
      font-family: var(--ff-display);
      font-size: clamp(14px, 1.2vw, 17px); font-weight: 400;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--light); padding: 0 32px; line-height: 1;
      border: 1.5px solid var(--light); border-radius: 0;
      background: transparent; cursor: pointer;
      transition: background .3s, color .3s, gap .35s cubic-bezier(.22,1,.36,1);
    }
    .cnt-submit:hover{ background: var(--light); color: var(--black); gap: 18px; }
    .cnt-submit:hover .arrow{ transform: translateX(4px); }
    .cnt-submit .arrow{ display: inline-block; transition: transform .35s cubic-bezier(.22,1,.36,1); }

    .cnt-success{
      margin-top: 18px; font-size: 13px;
      color: var(--power); letter-spacing: .05em;
      opacity: 0; transform: translateY(6px);
      transition: opacity .4s, transform .4s;
    }
    .cnt-success.show{ opacity: 1; transform: none; }

    /* socials */
    .socials{
      margin-top: 84px; display: flex; gap: 14px; justify-content: center;
      opacity: 0; transform: translateY(20px); animation: fi .8s ease .8s forwards;
    }
    .socials a{
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--black); border-radius: 0;
      background: transparent;
      transition: background .25s, color .25s, transform .25s;
      color: var(--black);
    }
    .socials a:hover{
      background: var(--light); color: var(--black);
      border-color: var(--light); transform: translateY(-3px);
    }
    .socials svg{ width: 18px; height: 18px; }

    /* footer reset para que .site-footer (negro) cierre la página */
    .site-footer{ margin-top: auto; }

    @media (max-width: 820px){
      main{ padding: 130px 6vw 60px; }
      .cnt-head{ margin-bottom: 48px; }
      .cnt-form{ gap: 22px; }
      .cnt-submit{ align-self: stretch; text-align: center; }
      .socials{ margin-top: 64px; }
    }
  </style>
</head>

<div class="mob-menu">

<main>
  <header class="cnt-head">
    <p class="cnt-tag">Hablemos</p>
    <h1 class="cnt-title">Contacto</h1>
    <p class="cnt-sub">“Todo empieza con una idea y un mensaje.”</p>
  </header>

  <form class="cnt-form" id="cntForm" novalidate>
    <div class="field">
      <label for="cnt-name">Nombre <span class="req">*</span></label>
      <input id="cnt-name" type="text" name="name" placeholder="Tu nombre..." required autocomplete="name"/>
    </div>
    <div class="field">
      <label for="cnt-email">Email <span class="req">*</span></label>
      <input id="cnt-email" type="email" name="email" placeholder="Tu email..." required autocomplete="email"/>
    </div>
    <div class="field">
      <label for="cnt-msg">Mensaje <span class="req">*</span></label>
      <textarea id="cnt-msg" name="message" placeholder="Dejanos un mensaje..." required></textarea>
    </div>
    <button class="cnt-submit" type="submit">
      <span class="label">Enviar</span>
      <span class="arrow">→</span>
    </button>
    <p class="cnt-success" id="cntSuccess">Gracias. Te respondemos a la brevedad.</p>
  </form>

  <nav class="socials" aria-label="Redes">
    <a href="https://www.linkedin.com/company/codestudiouy/" aria-label="LinkedIn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.5 2h-17A1.5 1.5 0 0 0 2 3.5v17A1.5 1.5 0 0 0 3.5 22h17a1.5 1.5 0 0 0 1.5-1.5v-17A1.5 1.5 0 0 0 20.5 2zM8 19H5v-9h3v9zM6.5 8.25A1.75 1.75 0 1 1 8.3 6.5a1.78 1.78 0 0 1-1.8 1.75zM19 19h-3v-4.74c0-1.42-.6-1.93-1.38-1.93A1.74 1.74 0 0 0 13 14.19a.66.66 0 0 0 0 .14V19h-3v-9h2.9v1.3a3.11 3.11 0 0 1 2.7-1.4c1.55 0 3.36.86 3.36 3.66z"/></svg></a>
    <a href="https://www.instagram.com/codestudio.uy/" aria-label="Instagram"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg></a>
    <a href="https://vimeo.com/user208872375?fl=pp&amp;fe=sh" aria-label="Vimeo"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.875 6.353c-.09 1.964-1.471 4.655-4.142 8.073C15.974 18 13.628 19.751 11.7 19.751c-1.193 0-2.203-1.099-3.025-3.299L7.027 10.43c-.61-2.2-1.265-3.299-1.965-3.299-.153 0-.687.319-1.601.954L2.5 6.851c1.005-.879 1.998-1.759 2.974-2.642C6.815 3.039 7.819 2.422 8.487 2.36c1.575-.151 2.546.927 2.911 3.234.394 2.49.667 4.04.821 4.645.456 2.073.957 3.109 1.503 3.109.423 0 1.06-.668 1.91-2.003.847-1.335 1.302-2.349 1.362-3.046.121-1.149-.334-1.726-1.362-1.726-.485 0-.984.111-1.498.331.998-3.265 2.902-4.85 5.713-4.762 2.085.061 3.068 1.413 2.948 4.052z"/></svg></a>
    <a href="mailto:hola@codestudio.com.uy" aria-label="Email"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></a>

<script src="js/nav.js"></script>
<script>
(()=>{
  'use strict';
  // form submission — FormSubmit.co (no backend) with mailto fallback
  const DEST_EMAIL='hola@codestudio.com.uy';
  const form=document.getElementById('cntForm');
  const success=document.getElementById('cntSuccess');
  const submitBtn=form.querySelector('.cnt-submit');
  const labelEl=submitBtn.querySelector('.label');
  const labelOriginal=labelEl.textContent;

  function buildMailtoUrl(name,email,msg){
    const subject=`Nuevo contacto desde la web — ${name}`;
    const body=
      `Hola Code Studio,\n\n`+
      `Mi nombre es ${name} y quiero ponerme en contacto con ustedes.\n\n`+
      `─── Datos ───\n`+
      `Nombre:  ${name}\n`+
      `Email:   ${email}\n\n`+
      `─── Mensaje ───\n`+
      `${msg}\n\n`+
      `—\nEnviado desde codestudio.com.uy`;
    return `mailto:${DEST_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  }

  function showMsg(text,isError){
    success.textContent=text;
    success.style.color=isError?'#EC1B07':'';
    success.classList.add('show');
    clearTimeout(showMsg._t);
    showMsg._t=setTimeout(()=>success.classList.remove('show'),7000);
  }

  form.addEventListener('submit',async(e)=>{
    e.preventDefault();
    const fields=['cnt-name','cnt-email','cnt-msg'].map(id=>document.getElementById(id));
    let ok=true;
    fields.forEach(f=>{
      const bad=!f.value.trim()||(f.type==='email'&&!/^\S+@\S+\.\S+$/.test(f.value));
      f.style.borderColor=bad?'#EC1B07':'';
      if(bad)ok=false;
    });
    if(!ok)return;

    const [nameEl,emailEl,msgEl]=fields;
    const name=nameEl.value.trim();
    const email=emailEl.value.trim();
    const msg=msgEl.value.trim();

    submitBtn.disabled=true;
    submitBtn.style.opacity='0.7';
    submitBtn.style.cursor='wait';
    labelEl.textContent='Enviando…';

    try{
      const res=await fetch('https://formsubmit.co/ajax/'+encodeURIComponent(DEST_EMAIL),{
        method:'POST',
        headers:{'Content-Type':'application/json','Accept':'application/json'},
        body:JSON.stringify({
          name:name, email:email, message:msg,
          _subject:`Nuevo contacto desde la web — ${name}`,
          _template:'table', _captcha:'false', _replyto:email
        })
      });
      const data=await res.json().catch(()=>({}));
      const isSuccess=data&&(data.success===true||data.success==='true');
      if(!isSuccess) throw new Error(data.message||'send_failed');
      showMsg('¡Gracias! Recibimos tu mensaje y te respondemos a la brevedad.',false);
      form.reset();
    }catch(err){
      window.location.href=buildMailtoUrl(name,email,msg);
      showMsg('Abrimos tu cliente de correo para terminar de enviar el mensaje.',false);
    }finally{
      submitBtn.disabled=false;
      submitBtn.style.opacity='';
      submitBtn.style.cursor='';
      labelEl.textContent=labelOriginal;
    }
  });
})();
</script>
