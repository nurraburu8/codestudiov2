backend:
  name: github
  repo: balurra/codestudiov2
  branch: main
  base_url: https://codestudio-oauth.urraburunicolas.workers.dev
  auth_endpoint: auth

media_folder: public/uploads
public_folder: /uploads

locale: es

collections:
  - name: trabajos
    label: Trabajos
    label_singular: Trabajo
    folder: src/content/trabajos
    create: true
    delete: true
    slug: '{{slug}}'
    extension: md
    format: yaml-frontmatter
    summary: '{{client}} · {{year}} ({{category}})'
    fields:
      - { label: Cliente, name: client, widget: string }
      - label: Tipo
        name: type
        widget: select
        options:
          - AFTERMOVIE
          - COMERCIAL
          - VIDEOCLIP
          - DOCUMENTAL
          - EVENTO
          - GIRA
          - BRANDED CONTENT
          - OTRO
      - label: Categoría
        name: category
        widget: select
        options:
          - Shows & Fiestas
          - Marcas
          - Eventos
      - { label: "Año", name: year, widget: number, value_type: int, min: 2000, max: 2100 }
      - { label: "Ubicación", name: location, widget: string, default: "Montevideo, Uruguay" }
      - { label: "Video URL", name: video, widget: string }
      - { label: "Cloudinary public_id (opcional)", name: cloudinaryId, widget: string, required: false }
      - { label: "Cover (opcional)", name: cover, widget: image, required: false }
      - { label: "Frase destacada", name: tagline, widget: string }
      - { label: "Orden", name: order, widget: number, value_type: int, default: 99 }
      - { label: "Publicado", name: publish, widget: boolean, default: true }
      - { label: "Destacado en home", name: featured, widget: boolean, default: false }
      - label: Creditos
        name: credits
        widget: list
        label_singular: Credito
        fields:
          - { label: Rol, name: role, widget: string }
          - { label: Nombre, name: name, widget: string }
      - label: Stats
        name: stats
        widget: list
        label_singular: Stat
        fields:
          - { label: Etiqueta, name: label, widget: string }
          - { label: Valor, name: value, widget: string }
      - { label: "Descripcion", name: body, widget: markdown }
