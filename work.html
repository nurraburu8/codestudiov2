<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta property="og:title" content="Trabajo — Code Studio"/>
  <meta name="description" content="Detalle del proyecto — Code Studio."/>
  <title>Trabajo — Code Studio</title>
  <link rel="stylesheet" href="css/brand.css"/>
  <link rel="stylesheet" href="css/nav.css"/>
  <link rel="stylesheet" href="css/footer.css"/>
  <link rel="stylesheet" href="css/gallery.css"/>
  <style>
    /* HERO video */
    .work-hero{
      position: relative;
      z-index: 1;
      padding: 140px 5vw 0;
      max-width: 1480px;
      margin: 0 auto;
    }
    .work-meta{
      display: flex;
      align-items: baseline;
      gap: 20px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .work-cat{
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--light);
      font-weight: 400;
    }
    .work-year{
      font-size: 11px;
      color: var(--mute);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .work-loc{
      font-size: 11px;
      color: var(--mute);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .work-title{
      font-family: var(--ff-display);
      font-size: clamp(48px, 9vw, 132px);
      line-height: 0.88;
      letter-spacing: 0.01em;
      margin-bottom: 6px;
    }
    .work-title .type{
      display: block;
      font-family: var(--ff-body);
      font-style: italic;
      font-weight: 300;
      font-size: clamp(12px, 1.1vw, 16px);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--light);
      opacity: 0.7;
      margin-bottom: 18px;
    }
    .work-title .client{ display: block; }

    .work-tagline{
      font-style: italic;
      font-weight: 300;
      font-size: clamp(16px, 1.6vw, 22px);
      color: rgba(235,235,235,0.55);
      max-width: 760px;
      margin: 18px 0 48px;
      line-height: 1.4;
    }

    .video-wrap{
      position: relative;
      aspect-ratio: 16/9;
      border-radius: 12px;
      overflow: hidden;
      background: #0a0a0a;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 30px 80px -20px rgba(0,0,0,0.7);
    }
    .video-wrap video{
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* BODY: description + sidebar */
    .work-body{
      position: relative;
      z-index: 1;
      max-width: 1480px;
      margin: 0 auto;
      padding: 80px 5vw 40px;
      display: grid;
      grid-template-columns: 1.6fr 1fr;
      gap: clamp(40px, 6vw, 100px);
    }

    .work-desc p{
      font-size: clamp(16px, 1.25vw, 19px);
      line-height: 1.65;
      color: rgba(235,235,235,0.8);
      letter-spacing: 0.005em;
      margin-bottom: 22px;
    }
    .work-desc p:first-of-type::first-line{
      font-weight: 500;
      color: var(--tx);
    }

    .sidebar{ display: flex; flex-direction: column; gap: 36px; }
    .sidebar h4{
      font-family: var(--ff-body);
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--light);
      font-weight: 500;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(253,117,43,0.18);
    }
    .credits .credit-row{
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 10px 0;
      border-bottom: 1px solid var(--hair);
      gap: 16px;
    }
    .credits .credit-row .k{
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mute);
      font-weight: 500;
    }
    .credits .credit-row .v{
      font-size: 13px;
      color: var(--tx);
      text-align: right;
    }

    .stats{ display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    .stat-card{
      padding: 18px 14px;
      border: 1px solid var(--hair);
      border-radius: 8px;
      text-align: center;
      background: rgba(255,255,255,0.02);
    }
    .stat-card .v{
      font-family: var(--ff-display);
      font-size: clamp(28px, 3vw, 40px);
      color: var(--light);
      line-height: 1;
      margin-bottom: 6px;
    }
    .stat-card .k{
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--mute);
    }

    /* RELATED */
    .related{
      position: relative;
      z-index: 1;
      max-width: 1480px;
      margin: 60px auto 0;
      padding: 0 5vw 100px;
    }
    .related h2{
      font-family: var(--ff-display);
      font-size: clamp(28px, 3.6vw, 48px);
      letter-spacing: 0.01em;
      margin-bottom: 36px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--hair);
    }
    .related .card-grid{ padding: 0; }

    .back-bar{
      position: relative;
      z-index: 1;
      max-width: 1480px;
      margin: 0 auto;
      padding: 60px 5vw 0;
    }
    .back-bar a{
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--mute);
      transition: color 0.3s, gap 0.3s;
    }
    .back-bar a:hover{ color: var(--light); gap: 14px; }

    @media (max-width: 820px) {
      .work-hero{ padding-top: 110px; }
      .work-body{ grid-template-columns: 1fr; padding-top: 50px; gap: 50px; }
      .stats{ grid-template-columns: repeat(3, 1fr); }
      .stat-card{ padding: 14px 8px; }
    }
  </style>
</head>
<body>

<div class="ambient" aria-hidden="true"><i></i><i></i><i></i></div>

<nav class="nav">

  </ul>

</nav>
<div class="mob-menu">
  <a href="index.html">Inicio</a>
  <a href="shows.html">Shows & Fiestas</a>
  <a href="marcas.html">Marcas</a>
  <a href="eventos.html">Eventos</a>

<div class="back-bar"><a href="javascript:history.length>1?history.back():location.assign('index.html')">← Volver</a></div>

<section class="work-hero">
  <div class="work-meta">
    <span class="work-cat" id="workCat"></span>
    <span class="work-year" id="workYear"></span>
    <span class="work-loc" id="workLoc"></span>
  </div>
  <h1 class="work-title">
    <span class="type" id="workType"></span>
    <span class="client" id="workClient"></span>
  </h1>
  <p class="work-tagline" id="workTagline"></p>
  <div class="video-wrap">
    <video id="workVideo" controls preload="metadata" playsinline></video>
  </div>
</section>

<section class="work-body">
  <div class="work-desc" id="workDesc"></div>
  <aside class="sidebar">
    <div class="stats" id="workStats"></div>
    <div class="credits">
      <h4>Créditos</h4>
      <div id="workCredits"></div>
    </div>
  </aside>
</section>

<section class="related">
  <h2>Otros trabajos</h2>
  <div class="card-grid" data-gallery="all" data-limit="3" id="relatedGrid"></div>
</section>

<footer class="site-footer">
  <div class="fg"></div>
  <div class="fgr">
    <div class="fl">Code<i>.</i>Studio</div>
    <div class="fc">
      <img src="assets/img/logo.png" alt=""/>
      <span>For those who create endlessly</span>
    </div>
  </div>
</footer>

<script src="js/works.js"></script>
<script src="js/nav.js"></script>
<script src="js/work-detail.js"></script>

</body>
