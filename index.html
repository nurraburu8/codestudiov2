<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeStudio</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* ── HEADER (logo) ────────────────────────────────── */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      padding: 22px 28px 0;
    }

    .logo img {
      height: clamp(48px, 8vw, 110px);
      width: auto;
      display: block;
    }

    /* ── NAV ──────────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: calc(22px + clamp(48px, 8vw, 110px) + 8px) 28px 0;
    }

    nav a {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.75);
      transition: color 0.2s;
    }

    nav a:hover {
      color: #fff;
    }

    /* ── SLIDESHOW ─────────────────────────────────────── */
    .slideshow {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.9s ease;
    }

    .slide.active {
      opacity: 1;
    }

    .slide video,
    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── BOTTOM INFO ──────────────────────────────────── */
    .bottom {
      position: fixed;
      bottom: 46px;
      left: 0;
      right: 0;
      z-index: 50;
      padding: 0 28px;
    }

    .director-name {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .slide-nav {
      display: flex;
      justify-content: space-between;
      max-width: 340px;
    }

    .slide-nav button {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: rgba(255, 255, 255, 0.4);
      cursor: pointer;
      padding: 0;
      transition: color 0.2s, font-weight 0.2s;
    }

    .slide-nav button.active {
      color: #fff;
      font-weight: 700;
    }

    .slide-nav button:hover {
      color: rgba(255, 255, 255, 0.8);
    }

    /* ── FOOTER ────────────────────────────────────────── */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 50;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px 28px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    footer a {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.6);
      transition: color 0.2s;
    }

    footer a:hover {
      color: #fff;
    }
  </style>
</head>
<body>

  <!-- Logo -->
  <header>
    <a href="#" class="logo">
      <img src="logo.png" alt="CodeStudio">
    </a>
  </header>

  <!-- Navigation -->
  <nav>
    <a href="#">Directors</a>
    <a href="#">Film + TV</a>
    <a href="#">Photographers</a>
    <a href="#">Music</a>
  </nav>

  <!-- Slideshow -->
  <div class="slideshow" id="slideshow">
    <div class="slide active" data-director="Director 1">
      <video autoplay muted loop playsinline>
        <source src="logoanimation.mp4" type="video/mp4">
      </video>
    </div>
    <div class="slide" data-director="Director 2">
      <img src="camara.jpeg" alt="Director 2">
    </div>
    <div class="slide" data-director="Director 3"></div>
    <div class="slide" data-director="Director 4"></div>
    <div class="slide" data-director="Director 5"></div>
    <div class="slide" data-director="Director 6"></div>
    <div class="slide" data-director="Director 7"></div>
    <div class="slide" data-director="Director 8"></div>
    <div class="slide" data-director="Director 9"></div>
  </div>

  <!-- Bottom: director name + slide numbers -->
  <div class="bottom">
    <div class="director-name" id="directorName">Director 1</div>
    <div class="slide-nav" id="slideNav">
      <button class="active" data-index="0">1</button>
      <button data-index="1">2</button>
      <button data-index="2">3</button>
      <button data-index="3">4</button>
      <button data-index="4">5</button>
      <button data-index="5">6</button>
      <button data-index="6">7</button>
      <button data-index="7">8</button>
      <button data-index="8">9</button>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <a href="#">Uruguay</a>
    <a href="#">Contact</a>
    <a href="#">Legals</a>
  </footer>

  <script>
    const slides = Array.from(document.querySelectorAll('.slide'));
    const btns   = Array.from(document.querySelectorAll('#slideNav button'));
    const label  = document.getElementById('directorName');
    let current  = 0;

    function goTo(idx) {
      slides[current].classList.remove('active');
      btns[current].classList.remove('active');
      current = idx;
      slides[current].classList.add('active');
      btns[current].classList.add('active');
      label.textContent = slides[current].dataset.director;
    }

    btns.forEach(btn => btn.addEventListener('click', () => goTo(+btn.dataset.index)));

    // Auto-advance every 6s
    setInterval(() => goTo((current + 1) % slides.length), 6000);
  </script>

</body>
</html>
