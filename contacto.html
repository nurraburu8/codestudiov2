<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta property="og:title" content="Contacto — Code Studio"/>
  <meta name="description" content="Todo empieza con una idea y un mensaje. Conectá con Code Studio."/>
  <title>Contacto — Code Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--milk:#FBF9F6;--light:#FD7628;--power:#FC1B07;--bg:#060606;--tx:#ebebeb;--mute:#555}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;font-weight:300;
      overflow-x:hidden;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
    a{color:inherit;text-decoration:none}
    img{display:block}

    /* grain */
    body::after{content:'';position:fixed;inset:0;z-index:9000;pointer-events:none;opacity:.025;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:200px 200px}

    /* ambient */
    .ambient{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .ambient i{position:absolute;border-radius:50%;filter:blur(clamp(80px,15vw,150px));mix-blend-mode:screen}
    .ambient i:nth-child(1){width:55vw;height:55vw;background:rgba(253,118,40,.07);top:-18%;left:-12%;animation:bf1 28s ease-in-out infinite alternate}
    .ambient i:nth-child(2){width:42vw;height:42vw;background:rgba(252,27,7,.05);bottom:-12%;right:-8%;animation:bf2 24s ease-in-out infinite alternate}
    .ambient i:nth-child(3){width:35vw;height:35vw;background:rgba(253,118,40,.035);top:35%;left:25%;animation:bf3 32s ease-in-out infinite alternate}
    @keyframes bf1{0%{transform:translate(0,0) scale(1)}50%{transform:translate(14vw,8vh) scale(1.15)}100%{transform:translate(4vw,-6vh) scale(.9)}}
    @keyframes bf2{0%{transform:translate(0,0) scale(1)}50%{transform:translate(-10vw,-6vh) scale(1.12)}100%{transform:translate(-4vw,5vh) scale(.92)}}
    @keyframes bf3{0%{transform:translate(0,0) scale(1)}50%{transform:translate(-7vw,10vh) scale(1.08)}100%{transform:translate(8vw,-7vh) scale(1.02)}}

    /* nav */
    .nav{position:fixed;top:0;left:0;right:0;z-index:300;
      display:flex;justify-content:space-between;align-items:center;padding:30px 5vw;
      transition:transform .45s cubic-bezier(.22,1,.36,1)}
    .nav.hide{transform:translateY(-100%)}
    .nav-b{display:flex;align-items:center}
    .nav-b img{height:42px;filter:brightness(10)}
    .nav-l{display:flex;gap:36px;list-style:none}
    .nav-l a{font-size:10px;letter-spacing:.22em;text-transform:uppercase;opacity:.5;transition:opacity .3s;position:relative}
    .nav-l a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--light);transition:width .3s cubic-bezier(.22,1,.36,1)}
    .nav-l a:hover{opacity:1}
    .nav-l a:hover::after{width:100%}
    .nav-l a.act{opacity:1}
    .nav-l a.act::after{width:100%}

    /* main wrapper */
    main{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;
      padding:160px 5vw 80px;width:100%}

    /* hero */
    .cnt-head{text-align:center;max-width:720px;margin:0 auto 64px;
      opacity:0;transform:translateY(20px);animation:fi .8s ease .2s forwards}
    .cnt-tag{font-size:clamp(10px,1vw,12px);letter-spacing:.35em;text-transform:uppercase;
      color:var(--light);font-weight:400;margin-bottom:22px}
    .cnt-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(56px,10vw,128px);line-height:.88;
      margin-bottom:26px}
    .cnt-sub{font-style:italic;font-weight:300;font-size:clamp(15px,1.4vw,20px);
      color:rgba(235,235,235,.55);letter-spacing:.02em}
    @keyframes fi{to{opacity:1;transform:none}}

    /* form */
    .cnt-form{width:100%;max-width:560px;display:flex;flex-direction:column;gap:28px;
      opacity:0;transform:translateY(24px);animation:fi .9s ease .5s forwards}
    .field{display:flex;flex-direction:column;gap:10px}
    .field label{font-size:10px;letter-spacing:.22em;text-transform:uppercase;
      color:rgba(235,235,235,.6);font-weight:400}
    .field label .req{color:var(--light);margin-left:2px}
    .field input,.field textarea{font-family:inherit;font-size:15px;font-weight:300;color:var(--tx);
      background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.08);border-radius:6px;
      padding:16px 18px;outline:none;transition:border-color .3s,background .3s,box-shadow .3s;
      width:100%;letter-spacing:.01em}
    .field textarea{min-height:150px;resize:vertical;line-height:1.55}
    .field input::placeholder,.field textarea::placeholder{color:rgba(235,235,235,.25);font-weight:300}
    .field input:hover,.field textarea:hover{border-color:rgba(255,255,255,.16)}
    .field input:focus,.field textarea:focus{
      border-color:rgba(253,118,40,.55);background:rgba(253,118,40,.035);
      box-shadow:0 0 0 4px rgba(253,118,40,.07)}

    .cnt-submit{align-self:flex-start;margin-top:8px;
      font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.18em;
      color:#fff;background:linear-gradient(135deg,var(--light),var(--power));
      border:none;border-radius:6px;padding:16px 38px;cursor:pointer;
      transition:transform .3s cubic-bezier(.22,1,.36,1),box-shadow .3s,filter .3s;
      box-shadow:0 8px 28px -10px rgba(253,118,40,.45)}
    .cnt-submit:hover{transform:translateY(-2px);
      box-shadow:0 14px 40px -10px rgba(253,118,40,.6);
      filter:brightness(1.05)}
    .cnt-submit:active{transform:translateY(0)}

    .cnt-success{margin-top:18px;font-size:13px;color:var(--light);letter-spacing:.05em;
      opacity:0;transform:translateY(6px);transition:opacity .4s,transform .4s}
    .cnt-success.show{opacity:1;transform:none}

    /* socials */
    .socials{margin-top:84px;display:flex;gap:14px;justify-content:center;
      opacity:0;transform:translateY(20px);animation:fi .8s ease .8s forwards}
    .socials a{width:48px;height:48px;display:flex;align-items:center;justify-content:center;
      border:1px solid rgba(255,255,255,.08);border-radius:10px;
      background:rgba(255,255,255,.02);
      transition:border-color .3s,background .3s,transform .3s,color .3s;
      color:rgba(235,235,235,.6)}
    .socials a:hover{border-color:var(--light);color:var(--light);
      background:rgba(253,118,40,.06);transform:translateY(-3px)}
    .socials svg{width:18px;height:18px}

    /* footer */
    footer{position:relative;z-index:1;padding:60px 5vw 52px;border-top:1px solid rgba(255,255,255,.04);margin-top:auto}
    .fg{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--light),var(--power),transparent);opacity:.5}
    .fgr{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:20px}
    .fl{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.1em}
    .fl i{color:var(--light);font-style:normal}
    .fc{display:flex;flex-direction:column;align-items:center;gap:12px}
    .fc img{height:36px;filter:brightness(0) invert(1);opacity:.5}
    .fc span{font-size:9px;letter-spacing:.22em;color:#2a2a2a;text-transform:uppercase}
    .fr{display:flex;justify-content:flex-end;gap:28px}
    .fr a{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--mute);transition:color .3s}
    .fr a:hover{color:var(--tx)}

    /* hamburger */
    .ham{display:none;flex-direction:column;gap:5px;cursor:pointer;z-index:301;padding:8px;background:none;border:none}
    .ham span{display:block;width:22px;height:1.5px;background:var(--tx);transition:transform .3s,opacity .3s}
    .ham.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
    .ham.open span:nth-child(2){opacity:0}
    .ham.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}
    .mob-menu{position:fixed;inset:0;z-index:299;background:rgba(6,6,6,.96);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;
      opacity:0;pointer-events:none;transition:opacity .35s ease}
    .mob-menu.open{opacity:1;pointer-events:auto}
    .mob-menu a{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,8vw,48px);
      letter-spacing:.08em;opacity:.7;transition:opacity .3s,color .3s}
    .mob-menu a:hover{opacity:1;color:var(--light)}

    @media(max-width:820px){
      .nav-l{display:none}
      .ham{display:flex}
      .nav-b img{height:34px}
      main{padding:130px 6vw 60px}
      .cnt-head{margin-bottom:48px}
      .cnt-form{gap:22px}
      .cnt-submit{align-self:stretch;text-align:center}
      .fgr{grid-template-columns:1fr;text-align:center;gap:28px}
      .fr{justify-content:center}
      .socials{margin-top:64px}
    }
  </style>
</head>
<body>

<div class="ambient" aria-hidden="true"><i></i><i></i><i></i></div>

<nav class="nav" id="nav">
  <a href="index.html" class="nav-b"><img src="assets/img/logo.png" alt="Code Studio"/></a>
  <ul class="nav-l">
    <li><a href="shows.html">Shows & Fiestas</a></li>
    <li><a href="marcas.html">Marcas</a></li>
    <li><a href="eventos.html">Eventos</a></li>
    <li><a href="nosotros.html">Sobre nosotros</a></li>
    <li><a href="contacto.html" class="act">Contacto</a></li>
  </ul>
  <button class="ham" id="ham" aria-label="Menú"><span></span><span></span><span></span></button>
</nav>
<div class="mob-menu" id="mobMenu">
  <a href="index.html">Inicio</a>
  <a href="shows.html">Shows & Fiestas</a>
  <a href="marcas.html">Marcas</a>
  <a href="eventos.html">Eventos</a>
  <a href="nosotros.html">Sobre nosotros</a>
  <a href="contacto.html">Contacto</a>
</div>

<main>
  <header class="cnt-head">
    <p class="cnt-tag">Hablemos</p>
    <h1 class="cnt-title">Contacto</h1>
    <p class="cnt-sub">“Todo empieza con una idea y un mensaje.”</p>
  </header>

  <form class="cnt-form" id="cntForm" novalidate>
    <div class="field">
      <label for="cnt-name">Nombre <span class="req">*</span></label>
      <input id="cnt-name" type="text" name="name" placeholder="Tu nombre..." required autocomplete="name"/>
    </div>
    <div class="field">
      <label for="cnt-email">Email <span class="req">*</span></label>
      <input id="cnt-email" type="email" name="email" placeholder="Tu email..." required autocomplete="email"/>
    </div>
    <div class="field">
      <label for="cnt-msg">Mensaje <span class="req">*</span></label>
      <textarea id="cnt-msg" name="message" placeholder="Dejanos un mensaje..." required></textarea>
    </div>
    <button class="cnt-submit" type="submit">Enviar</button>
    <p class="cnt-success" id="cntSuccess">Gracias. Te respondemos a la brevedad.</p>
  </form>

  <nav class="socials" aria-label="Redes">
    <a href="https://www.linkedin.com/company/codestudiouy/" aria-label="LinkedIn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.5 2h-17A1.5 1.5 0 0 0 2 3.5v17A1.5 1.5 0 0 0 3.5 22h17a1.5 1.5 0 0 0 1.5-1.5v-17A1.5 1.5 0 0 0 20.5 2zM8 19H5v-9h3v9zM6.5 8.25A1.75 1.75 0 1 1 8.3 6.5a1.78 1.78 0 0 1-1.8 1.75zM19 19h-3v-4.74c0-1.42-.6-1.93-1.38-1.93A1.74 1.74 0 0 0 13 14.19a.66.66 0 0 0 0 .14V19h-3v-9h2.9v1.3a3.11 3.11 0 0 1 2.7-1.4c1.55 0 3.36.86 3.36 3.66z"/></svg></a>
    <a href="https://www.instagram.com/codestudio.uy/" aria-label="Instagram"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg></a>
    <a href="https://vimeo.com/user208872375?fl=pp&amp;fe=sh" aria-label="Vimeo"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.875 6.353c-.09 1.964-1.471 4.655-4.142 8.073C15.974 18 13.628 19.751 11.7 19.751c-1.193 0-2.203-1.099-3.025-3.299L7.027 10.43c-.61-2.2-1.265-3.299-1.965-3.299-.153 0-.687.319-1.601.954L2.5 6.851c1.005-.879 1.998-1.759 2.974-2.642C6.815 3.039 7.819 2.422 8.487 2.36c1.575-.151 2.546.927 2.911 3.234.394 2.49.667 4.04.821 4.645.456 2.073.957 3.109 1.503 3.109.423 0 1.06-.668 1.91-2.003.847-1.335 1.302-2.349 1.362-3.046.121-1.149-.334-1.726-1.362-1.726-.485 0-.984.111-1.498.331.998-3.265 2.902-4.85 5.713-4.762 2.085.061 3.068 1.413 2.948 4.052z"/></svg></a>
    <a href="mailto:hola@codestudio.com.uy" aria-label="Email"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></a>
  </nav>
</main>

<footer>
  <div class="fg"></div>
  <div class="fgr">
    <div class="fl">Code<i>.</i>Studio</div>
    <div class="fc">
      <img src="assets/img/logo.png" alt=""/>
      <span>For those who create endlessly</span>
    </div>
  </div>
</footer>

<script>
(()=>{
  'use strict';

  // nav hide on scroll
  let lastY=0;
  window.addEventListener('scroll',()=>{
    const y=window.scrollY;
    document.getElementById('nav').classList.toggle('hide',y>lastY&&y>100);
    lastY=y;
  },{passive:true});

  // hamburger
  const ham=document.getElementById('ham');
  const mobMenu=document.getElementById('mobMenu');
  if(ham&&mobMenu){
    ham.addEventListener('click',()=>{
      ham.classList.toggle('open');
      mobMenu.classList.toggle('open');
    });
    mobMenu.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>{
      ham.classList.remove('open');
      mobMenu.classList.remove('open');
    }));
  }

  // form submission — FormSubmit.co (no backend) with mailto fallback
  const DEST_EMAIL='hola@codestudio.com.uy';
  const form=document.getElementById('cntForm');
  const success=document.getElementById('cntSuccess');
  const submitBtn=form.querySelector('.cnt-submit');
  const submitBtnOriginal=submitBtn.textContent;

  function buildMailtoUrl(name,email,msg){
    const subject=`Nuevo contacto desde la web — ${name}`;
    const body=
      `Hola Code Studio,\n\n`+
      `Mi nombre es ${name} y quiero ponerme en contacto con ustedes.\n\n`+
      `─── Datos ───\n`+
      `Nombre:  ${name}\n`+
      `Email:   ${email}\n\n`+
      `─── Mensaje ───\n`+
      `${msg}\n\n`+
      `—\nEnviado desde codestudio.com.uy`;
    return `mailto:${DEST_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  }

  function showMsg(text,isError){
    success.textContent=text;
    success.style.color=isError?'#FC1B07':'';
    success.classList.add('show');
    clearTimeout(showMsg._t);
    showMsg._t=setTimeout(()=>success.classList.remove('show'),7000);
  }

  form.addEventListener('submit',async(e)=>{
    e.preventDefault();
    const fields=['cnt-name','cnt-email','cnt-msg'].map(id=>document.getElementById(id));
    let ok=true;
    fields.forEach(f=>{
      const bad=!f.value.trim()||(f.type==='email'&&!/^\S+@\S+\.\S+$/.test(f.value));
      f.style.borderColor=bad?'rgba(252,27,7,.6)':'';
      if(bad)ok=false;
    });
    if(!ok)return;

    const [nameEl,emailEl,msgEl]=fields;
    const name=nameEl.value.trim();
    const email=emailEl.value.trim();
    const msg=msgEl.value.trim();

    submitBtn.disabled=true;
    submitBtn.style.opacity='0.7';
    submitBtn.style.cursor='wait';
    submitBtn.textContent='Enviando…';

    try{
      const res=await fetch('https://formsubmit.co/ajax/'+encodeURIComponent(DEST_EMAIL),{
        method:'POST',
        headers:{'Content-Type':'application/json','Accept':'application/json'},
        body:JSON.stringify({
          name:name,
          email:email,
          message:msg,
          _subject:`Nuevo contacto desde la web — ${name}`,
          _template:'table',
          _captcha:'false',
          _replyto:email
        })
      });
      const data=await res.json().catch(()=>({}));
      const isSuccess=data&&(data.success===true||data.success==='true');
      if(!isSuccess) throw new Error(data.message||'send_failed');
      showMsg('¡Gracias! Recibimos tu mensaje y te respondemos a la brevedad.',false);
      form.reset();
    }catch(err){
      // fallback: open the user's email client with prefilled content
      window.location.href=buildMailtoUrl(name,email,msg);
      showMsg('Abrimos tu cliente de correo para terminar de enviar el mensaje.',false);
    }finally{
      submitBtn.disabled=false;
      submitBtn.style.opacity='';
      submitBtn.style.cursor='';
      submitBtn.textContent=submitBtnOriginal;
    }
  });
})();
</script>
</body>
</html>
